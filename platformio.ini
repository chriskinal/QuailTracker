; PlatformIO Project Configuration
; QuailTracker - GPS-synchronized Autonomous Recording Unit

[platformio]
src_dir = .
default_envs = nucleo_u575zi_q

; --- STM32 U575 Bring-Up (Nucleo-U575ZI-Q) ---
[env:nucleo_u575zi_q]
platform = ststm32
board = nucleo_u575zi_q

lib_compat_mode = off

build_src_filter =
    -<*>
    +<stm32/QuailTracker_U575/Core/Src/>
    +<stm32/QuailTracker_U575/Core/Startup/>
    +<stm32/QuailTracker_U575/Drivers/STM32U5xx_HAL_Driver/Src/>
    +<stm32/QuailTracker_U575/Drivers/BSP/STM32U5xx_Nucleo/>
    +<stm32/QuailTracker_U575/FATFS/App/>
    +<stm32/QuailTracker_U575/FATFS/Target/>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/FatFs/src/>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/FatFs/src/option/>

build_flags =
    -std=gnu11
    -DUSE_HAL_DRIVER
    -DSTM32U575xx
    -Istm32/QuailTracker_U575/Core/Inc
    -Istm32/QuailTracker_U575/Drivers/STM32U5xx_HAL_Driver/Inc
    -Istm32/QuailTracker_U575/Drivers/STM32U5xx_HAL_Driver/Inc/Legacy
    -Istm32/QuailTracker_U575/Drivers/CMSIS/Device/ST/STM32U5xx/Include
    -Istm32/QuailTracker_U575/Drivers/CMSIS/Include
    -Istm32/QuailTracker_U575/Drivers/BSP/STM32U5xx_Nucleo
    -Istm32/QuailTracker_U575/FATFS/App
    -Istm32/QuailTracker_U575/FATFS/Target
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/FatFs/src
    -mfpu=fpv5-sp-d16
    -mfloat-abi=hard

board_build.ldscript = stm32/QuailTracker_U575/STM32U575ZITXQ_FLASH.ld

extra_scripts = pre:stm32/QuailTracker_U575/extra_build.py

upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200

; --- STM32 Prototype (Nucleo-H723ZG) ---
[env:nucleo_h723zg]
platform = ststm32
board = nucleo_h723zg

lib_compat_mode = off

build_src_filter =
    -<*>
    +<stm32/QuailTracker/Core/Src/>
    +<stm32/QuailTracker/Core/Startup/>
    +<stm32/QuailTracker/Drivers/STM32H7xx_HAL_Driver/Src/>
    +<stm32/QuailTracker/FATFS/App/>
    +<stm32/QuailTracker/FATFS/Target/>
    +<stm32/QuailTracker/Middlewares/Third_Party/FatFs/src/>
    +<stm32/QuailTracker/Middlewares/Third_Party/FatFs/src/option/>

build_flags =
    -std=gnu11
    -DUSE_HAL_DRIVER
    -DSTM32H723xx
    -DUSE_PWR_LDO_SUPPLY
    -Istm32/QuailTracker/Core/Inc
    -Istm32/QuailTracker/Drivers/STM32H7xx_HAL_Driver/Inc
    -Istm32/QuailTracker/Drivers/STM32H7xx_HAL_Driver/Inc/Legacy
    -Istm32/QuailTracker/Drivers/CMSIS/Device/ST/STM32H7xx/Include
    -Istm32/QuailTracker/Drivers/CMSIS/Include
    -Istm32/QuailTracker/FATFS/App
    -Istm32/QuailTracker/FATFS/Target
    -Istm32/QuailTracker/Middlewares/Third_Party/FatFs/src
    -mfpu=fpv5-d16
    -mfloat-abi=hard

board_build.ldscript = stm32/QuailTracker/STM32H723ZGTX_FLASH.ld

extra_scripts = pre:stm32/QuailTracker/extra_build.py

upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
