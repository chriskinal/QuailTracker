; ESP32-C3 Bridge — SPI slave + WiFi AP + Web Server
; Production board: ESP32-C3 Super Mini

[platformio]
default_envs = esp32c3

[env:esp32c3]
; Platform 6.11.0 pairs with ESP-IDF 5.4.1 + riscv toolchain 14.2.0 —
; the set the firmware was developed against. Platform 7.0.0 jumps to
; ESP-IDF 6.0 which renamed esp_deep_sleep_enable_gpio_wakeup; revisit
; the upgrade when we migrate the laser-wake call site.
platform = espressif32 @ 6.11.0
board = esp32-c3-devkitm-1
framework = espidf
monitor_speed = 115200
extra_scripts =
    pre:embed_html.py
    post:post_build.py
board_build.partitions = partitions.csv
board_upload.flash_size = 4MB
build_flags =
    -DCONFIG_HTTPD_WS_SUPPORT=1
    -I../../shared
