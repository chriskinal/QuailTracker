
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900">
  <defs>
    <style>
      .outline{stroke:#4a2d14;stroke-width:8;fill:none}
      .sand{fill:#e6cf9f}
      .grass{fill:#3f7f3f}
      .grass2{fill:#2f6a2f}
      .feather1{fill:#9c5b2e}
      .feather2{fill:#c47a3a}
      .feather3{fill:#f3e6c9}
      .dark{fill:#2b1a10}
      .track{fill:#4a2d14}
      .banner{fill:#e7c995;stroke:#4a2d14;stroke-width:6}
      .text{font-family:serif;font-size:72px;font-weight:bold;fill:#3a2312}
    </style>
  </defs>

  <!-- outer badge -->
  <circle cx="450" cy="400" r="330" class="outline"/>
  
  <!-- background -->
  <ellipse cx="450" cy="500" rx="300" ry="160" class="sand"/>

  <!-- grass clusters -->
  <g>
    <path class="grass" d="M180 470 l30 -90 l30 70 l20 -80 l25 100 z"/>
    <path class="grass2" d="M220 500 l20 -70 l25 60 l15 -60 l15 70 z"/>
    <path class="grass" d="M720 470 l-30 -90 l-30 70 l-20 -80 l-25 100 z"/>
    <path class="grass2" d="M680 500 l-20 -70 l-25 60 l-15 -60 l-15 70 z"/>
  </g>

  <!-- quail body -->
  <ellipse cx="480" cy="360" rx="150" ry="110" class="feather1"/>
  <ellipse cx="520" cy="380" rx="90" ry="80" class="feather3"/>

  <!-- feather pattern -->
  <g class="feather2">
    <ellipse cx="420" cy="350" rx="18" ry="12"/>
    <ellipse cx="450" cy="330" rx="18" ry="12"/>
    <ellipse cx="480" cy="350" rx="18" ry="12"/>
    <ellipse cx="510" cy="330" rx="18" ry="12"/>
    <ellipse cx="540" cy="350" rx="18" ry="12"/>
    <ellipse cx="460" cy="380" rx="18" ry="12"/>
    <ellipse cx="500" cy="390" rx="18" ry="12"/>
    <ellipse cx="540" cy="380" rx="18" ry="12"/>
  </g>

  <!-- head -->
  <circle cx="600" cy="260" r="60" class="feather1"/>
  <circle cx="600" cy="260" r="35" class="feather3"/>
  <circle cx="615" cy="255" r="8" class="dark"/>

  <!-- beak -->
  <polygon points="650,265 705,245 650,285" fill="#caa25a"/>

  <!-- legs -->
  <g stroke="#4a2d14" stroke-width="8">
    <line x1="440" y1="460" x2="430" y2="520"/>
    <line x1="520" y1="460" x2="510" y2="520"/>
  </g>

  <!-- quail tracks -->
  <g class="track">
    <path d="M360 520 l-12 28 l12 -14 l12 14 z"/>
    <path d="M400 560 l-12 28 l12 -14 l12 14 z"/>
    <path d="M520 540 l-12 28 l12 -14 l12 14 z"/>
    <path d="M560 580 l-12 28 l12 -14 l12 14 z"/>
  </g>

  <!-- acorns -->
  <g>
    <ellipse cx="270" cy="620" rx="18" ry="24" fill="#8a4f22"/>
    <rect x="260" y="600" width="20" height="12" fill="#6e3d1c"/>
    <ellipse cx="630" cy="620" rx="18" ry="24" fill="#8a4f22"/>
    <rect x="620" y="600" width="20" height="12" fill="#6e3d1c"/>
  </g>

  <!-- banner -->
  <rect x="200" y="620" width="500" height="140" rx="60" class="banner"/>

  <!-- title -->
  <text x="450" y="705" text-anchor="middle" class="text">QuailTracker</text>

</svg>
