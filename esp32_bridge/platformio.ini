; ESP32-C3 Bridge — SPI slave + WiFi AP + Web Server
; Production board: ESP32-C3 Super Mini

[platformio]
default_envs = esp32c3

[env:esp32c3]
platform = espressif32 @ 7.0.0
; Pin ESP-IDF to v5.4.1 — v6.0 (the default for platform 7.0.0) renamed
; esp_deep_sleep_enable_gpio_wakeup; revisit when migrating to v6.
; Toolchain + esptool versions pinned to the set ESP-IDF 5.4.1 expects;
; without this, platform 7.0.0 pulls newer ones paired with v6.0 and
; tool_version_check.cmake refuses to build.
platform_packages =
    framework-espidf @ ~3.50401.0
    toolchain-riscv32-esp @ 14.2.0+20241119
    toolchain-esp32ulp @ ~1.23800.0
    tool-esptoolpy @ ~1.40501.0
board = esp32-c3-devkitm-1
framework = espidf
monitor_speed = 115200
extra_scripts =
    pre:embed_html.py
    post:post_build.py
board_build.partitions = partitions.csv
board_upload.flash_size = 4MB
build_flags =
    -DCONFIG_HTTPD_WS_SUPPORT=1
    -I../../shared
