; PlatformIO Project Configuration
; QuailTracker - GPS-synchronized Autonomous Recording Unit

[platformio]
src_dir = .
default_envs = stm32u575

; --- STM32U575VGT6 Production Target (1 MB, LQFP100) ---
; ststm32 has no bare-VGT6 board, so we base on the ZIQ Nucleo but constrain to
; the real 1 MB part: the 1 MB linker (STM32U575ZITXQ_FLASH.ld, FLASH=1008K) and
; the size-check override below govern — NOT the ZIQ's 2 MB. Field/production
; hardware is the VGT6; the ZIQ was an early prototype only.
[env:stm32u575]
platform = ststm32 @ 19.6.0
board = nucleo_u575zi_q
board_upload.maximum_size = 1048576   ; 1 MB (VGT6), not the ZIQ's 2 MB

lib_compat_mode = off

build_src_filter =
    -<*>
    +<stm32/QuailTracker_U575/Core/Src/>
    +<stm32/QuailTracker_U575/Core/Startup/>
    +<stm32/QuailTracker_U575/Drivers/STM32U5xx_HAL_Driver/Src/>
    +<stm32/QuailTracker_U575/FATFS/App/>
    +<stm32/QuailTracker_U575/FATFS/Target/>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/FatFs/src/>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/FatFs/src/option/>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/FreeRTOS/Source/>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/FreeRTOS/Source/portable/GCC/ARM_CM33_NTZ/non_secure/>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/FreeRTOS/Source/portable/MemMang/>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS_V2/>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/TFLiteMicro/>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/CMSIS_DSP/Source/TransformFunctions/TransformFunctions.c>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/CMSIS_DSP/Source/CommonTables/CommonTables.c>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/CMSIS_DSP/Source/FastMathFunctions/FastMathFunctions.c>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/CMSIS_DSP/Source/BasicMathFunctions/BasicMathFunctions.c>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/CMSIS_DSP/Source/StatisticsFunctions/StatisticsFunctions.c>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/CMSIS_DSP/Source/ComplexMathFunctions/arm_cmplx_mag_q15.c>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/CMSIS_DSP/Source/ComplexMathFunctions/arm_cmplx_mag_f32.c>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/SEGGER_RTT/>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/SystemView/SEGGER/>
    +<stm32/QuailTracker_U575/Middlewares/Third_Party/SystemView/FreeRTOS/>

build_flags =
    -std=gnu11
    -Wl,-Map,.pio/build/stm32u575/firmware.map
    -DUSE_HAL_DRIVER
    -DSTM32U575xx
    '-DSEGGER_RTT_SECTION=".rtt_cb"'
    -Istm32/QuailTracker_U575/Core/Inc
    -Istm32/QuailTracker_U575/Drivers/STM32U5xx_HAL_Driver/Inc
    -Istm32/QuailTracker_U575/Drivers/STM32U5xx_HAL_Driver/Inc/Legacy
    -Istm32/QuailTracker_U575/Drivers/CMSIS/Device/ST/STM32U5xx/Include
    -Istm32/QuailTracker_U575/Drivers/CMSIS/Include
    -Istm32/QuailTracker_U575/FATFS/App
    -Istm32/QuailTracker_U575/FATFS/Target
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/FatFs/src
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/FreeRTOS/Source/include
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/FreeRTOS/Source/portable/GCC/ARM_CM33_NTZ/non_secure
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS_V2
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/CMSIS/RTOS2/Include
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/TFLiteMicro
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/TFLiteMicro/third_party/flatbuffers/include
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/TFLiteMicro/third_party/gemmlowp
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/TFLiteMicro/third_party/ruy
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/TFLiteMicro/third_party/kissfft
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/TFLiteMicro/third_party/cmsis_nn
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/TFLiteMicro/third_party/cmsis_nn/Include
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/CMSIS_DSP/Include
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/CMSIS_DSP/PrivateInclude
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/SEGGER_RTT
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/SystemView/SEGGER
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/SystemView/Config
    -Istm32/QuailTracker_U575/Middlewares/Third_Party/SystemView/FreeRTOS
    -Ishared
    -DRTT_USE_ASM=0
    -DTF_LITE_STATIC_MEMORY
    -DTF_LITE_MCU_DEBUG_LOG
    -DPROJECT_GENERATION
    -DCMSIS_NN
    -mfpu=fpv5-sp-d16
    -mfloat-abi=hard
    -include stm32/QuailTracker_U575/Core/Inc/arm_dsp_compat.h

; C++ flags for TFLite Micro (.cc files)
build_unflags = -std=gnu++14

board_build.ldscript = stm32/QuailTracker_U575/STM32U575ZITXQ_FLASH.ld

extra_scripts = pre:stm32/QuailTracker_U575/extra_build.py

upload_protocol = jlink
debug_tool = jlink
monitor_port = socket://localhost:19021
monitor_speed = 115200

