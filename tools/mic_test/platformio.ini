; Mic Test Firmware — LED brightness tracks PDM mic amplitude
; Standalone project for testing IM72D128 mic breakout boards

[platformio]
src_dir = .
default_envs = mic_test

[env:mic_test]
platform = ststm32
board = nucleo_u575zi_q

lib_compat_mode = off

build_src_filter =
    -<*>
    +<src/>
    +<../../stm32/QuailTracker_U575/Drivers/STM32U5xx_HAL_Driver/Src/>
    +<../../stm32/QuailTracker_U575/Core/Startup/>
    +<../../stm32/QuailTracker_U575/Core/Src/system_stm32u5xx.c>
    +<../../stm32/QuailTracker_U575/Middlewares/Third_Party/SEGGER_RTT/>

build_flags =
    -std=gnu11
    -DUSE_HAL_DRIVER
    -DSTM32U575xx
    '-DSEGGER_RTT_SECTION=".rtt_cb"'
    -DRTT_USE_ASM=0
    -I../../stm32/QuailTracker_U575/Core/Inc
    -I../../stm32/QuailTracker_U575/Drivers/STM32U5xx_HAL_Driver/Inc
    -I../../stm32/QuailTracker_U575/Drivers/STM32U5xx_HAL_Driver/Inc/Legacy
    -I../../stm32/QuailTracker_U575/Drivers/CMSIS/Device/ST/STM32U5xx/Include
    -I../../stm32/QuailTracker_U575/Drivers/CMSIS/Include
    -I../../stm32/QuailTracker_U575/Middlewares/Third_Party/SEGGER_RTT
    -mfpu=fpv5-sp-d16
    -mfloat-abi=hard

board_build.ldscript = ../../stm32/QuailTracker_U575/STM32U575ZITXQ_FLASH.ld

extra_scripts = pre:extra_build.py

upload_protocol = jlink
debug_tool = jlink
